<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - VAULT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./CSS/auth.css">
    <!-- FAVICON ADDED -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
    
    <!-- LOCAL SUPABASE CLIENT -->
    
    
    <script src="./JAVASCRIPT/supabase.js"></script>

    
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3a0ca3;
            --success-color: #4cc9f0;
            --danger-color: #f72585;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .auth-logo i {
            font-size: 2.5rem;
            color: var(--primary-color);
        }
        
        .auth-logo h1 {
            font-size: 2rem;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .auth-header h2 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .auth-header p {
            color: #666;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        
        .input-with-icon {
            position: relative;
        }
        
        .input-with-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }
        
        .input-with-icon input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #eaeaea;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .input-with-icon input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(67, 97, 238, 0.3);
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
        
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        
        .message.success {
            background: rgba(76, 201, 240, 0.1);
            color: var(--success-color);
            border: 1px solid var(--success-color);
            display: block;
        }
        
        .message.error {
            background: rgba(247, 37, 133, 0.1);
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
            display: block;
        }
        
        .loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        @media (max-width: 576px) {
            .auth-container {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fas fa-university"></i>
                <h1>VAULT</h1>
            </div>
            <h2>Welcome Back</h2>
            <p>Sign in to your account to continue</p>
        </div>
        
        <div class="message" id="message"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-with-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <div class="input-with-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Enter your password" required>
                </div>
                <a href="#" id="forgotPassword" style="display: block; text-align: right; margin-top: 8px; color: var(--primary-color); text-decoration: none;">Forgot password?</a>
            </div>
            
            <div class="form-group">
                <label style="display: flex; align-items: center; gap: 10px;">
                    <input type="checkbox" id="remember">
                    <span>Remember me</span>
                </label>
            </div>
            
            <button type="submit" class="btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Don't have an account? <a href="register.html">Sign up</a></p>
            <p><a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a></p>
        </div>
    </div>



    <script>
        // Use the supabase.js client (your js/supabase.js)
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const messageDiv = document.getElementById('message');
    
        async function showMessage(text, type = 'success') {
            messageDiv.textContent = text;
            messageDiv.className = `message ${type}`;
            messageDiv.style.display = 'block';
        }
    
        async function checkExistingSession() {
            try {
                const result = await window.supabaseClient.getCurrentUser();
                if (result.success && result.user) {
                    const user = result.user;
                    if (user.email === 'Arinze18@vault.com') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }
            } catch (err) {
                console.log('No active session', err);
            }
        }
    
        document.addEventListener('DOMContentLoaded', () => {
            checkExistingSession();
        });
    
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
    
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
    
            if (!email || !password) {
                showMessage('Please fill in both email and password', 'error');
                return;
            }
    
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing In...';
            messageDiv.style.display = 'none';
    
            try {
                // Admin bypass
                if (email === 'Arinze18@vault.com' && password === 'Arinze18') {
                    showMessage('Admin login successful! Redirecting...');
                    setTimeout(() => window.location.href = 'admin.html', 800);
                    return;
                }
    
                // Supabase login
                const result = await window.supabaseClient.signIn(email, password);
    
                if (!result.success) {
                    showMessage(result.error || 'Login failed. Try again.', 'error');
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
                    return;
                }
    
                showMessage('Login successful! Redirecting...');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 800);
    
            } catch (err) {
                console.error(err);
                showMessage('Something went wrong. Try again.', 'error');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Sign In';
            }
        });
    
        // Forgot password
        document.getElementById('forgotPassword').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = prompt('Enter your email to reset password:');
            if (!email) return;
    
            try {
                const { error } = await supabaseClient.supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/reset-password.html'
                });
                if (error) alert('Error: ' + error.message);
                else alert('Password reset email sent! Check your inbox.');
            } catch (err) {
                alert('Failed to send reset email: ' + err.message);
            }
        });
    </script>
</body>
</html>
