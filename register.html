<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - VAULT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./CSS/auth.css">
    <!-- FAVICON ADDED -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💰</text></svg>">
    
    <!-- LOCAL SUPABASE CLIENT -->
    
    <script src="./JAVASCRIPT/supabase.js"></script>
    <script src="./JAVASCRIPT/supabase-local.js"></script>
      
    
    
    <style>
        :root {
            --primary-color: #4361ee;
            --secondary-color: #3a0ca3;
            --success-color: #4cc9f0;
            --danger-color: #f72585;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .auth-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 500px;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .auth-logo i {
            font-size: 2.5rem;
            color: var(--primary-color);
        }
        
        .auth-logo h1 {
            font-size: 2rem;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .auth-header h2 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .auth-header p {
            color: #666;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        
        .input-with-icon {
            position: relative;
        }
        
        .input-with-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
        }
        
        .input-with-icon input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #eaeaea;
            border-radius: 10px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }
        
        .input-with-icon input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.1);
        }
        
        .password-strength {
            margin-top: 10px;
        }
        
        .strength-bar {
            height: 5px;
            background: #eaeaea;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 5px;
        }
        
        .strength-meter {
            height: 100%;
            width: 0%;
            background: var(--danger-color);
            transition: width 0.3s ease;
        }
        
        .strength-meter.good {
            background: var(--success-color);
        }
        
        .strength-meter.strong {
            background: #00b09b;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color));
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(67, 97, 238, 0.3);
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
        
        .auth-footer a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 600;
        }
        
        .message {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
            display: none;
        }
        
        .message.success {
            background: rgba(76, 201, 240, 0.1);
            color: var(--success-color);
            border: 1px solid var(--success-color);
            display: block;
        }
        
        .message.error {
            background: rgba(247, 37, 133, 0.1);
            color: var(--danger-color);
            border: 1px solid var(--danger-color);
            display: block;
        }
        
        .loading {
            opacity: 0.7;
            cursor: not-allowed;
        }
        
        @media (max-width: 576px) {
            .auth-container {
                padding: 30px 20px;
            }
            
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="fas fa-university"></i>
                <h1>VAULT</h1>
            </div>
            <h2>Create Account</h2>
            <p>Join thousands of investors growing their wealth</p>
        </div>
        
        <div class="message" id="message"></div>
        
        <form id="registerForm">
            <div class="form-row">
                <div class="form-group">
                    <label>First Name</label>
                    <div class="input-with-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="firstName" placeholder="First name" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Last Name</label>
                    <div class="input-with-icon">
                        <i class="fas fa-user"></i>
                        <input type="text" id="lastName" placeholder="Last name" required>
                    </div>
                </div>
            </div>
            
            <div class="form-group">
                <label>Email Address</label>
                <div class="input-with-icon">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Phone Number (Optional)</label>
                <div class="input-with-icon">
                    <i class="fas fa-phone"></i>
                    <input type="tel" id="phone" placeholder="+1 (555) 123-4567">
                </div>
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <div class="input-with-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="Create a password" required>
                </div>
                <div class="password-strength">
                    <div class="strength-bar">
                        <div class="strength-meter" id="strengthMeter"></div>
                    </div>
                    <small>Minimum 8 characters with letters and numbers</small>
                </div>
            </div>
            
            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-with-icon">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                </div>
            </div>
            
            <div class="form-group">
                <label style="display: flex; align-items: flex-start; gap: 10px;">
                    <input type="checkbox" id="terms" style="margin-top: 5px;" required>
                    <span>I agree to the <a href="#" style="color: var(--primary-color);">Terms of Service</a> and <a href="#" style="color: var(--primary-color);">Privacy Policy</a></span>
                </label>
            </div>
            
            <button type="submit" class="btn" id="registerBtn">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Already have an account? <a href="login.html">Sign in</a></p>
            <p><a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a></p>
        </div>
    </div>
    
   
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('Register page loaded');
        
            // Check if already logged in
            window.supabaseClient.getCurrentUser().then(res => {
                if (res.success && res.user) {
                    const isAdmin = res.user.email === 'Arinze18@vault.com';
                    window.location.href = isAdmin ? 'admin.html' : 'dashboard.html';
                }
            });
        
            const registerForm = document.getElementById('registerForm');
            const registerBtn = document.getElementById('registerBtn');
            const messageDiv = document.getElementById('message');
        
            // Password strength meter
            document.getElementById('password').addEventListener('input', function() {
                const password = this.value;
                const meter = document.getElementById('strengthMeter');
                let strength = 0;
                if (password.length >= 8) strength += 25;
                if (/[A-Z]/.test(password)) strength += 25;
                if (/[0-9]/.test(password)) strength += 25;
                if (/[^A-Za-z0-9]/.test(password)) strength += 25;
                meter.style.width = strength + '%';
                meter.className = 'strength-meter';
                if (strength >= 50) meter.classList.add('good');
                if (strength >= 75) meter.classList.add('strong');
            });
        
            registerForm.addEventListener('submit', async function(e) {
                e.preventDefault();
        
                const firstName = document.getElementById('firstName').value.trim();
                const lastName = document.getElementById('lastName').value.trim();
                const email = document.getElementById('email').value.trim().toLowerCase();
                const phone = document.getElementById('phone').value.trim();
                const password = document.getElementById('password').value;
                const confirmPassword = document.getElementById('confirmPassword').value;
                const terms = document.getElementById('terms').checked;
        
                // Validation
                if (!firstName || !lastName) return showMessage('Please enter your first and last name', 'error');
                if (!email.includes('@')) return showMessage('Please enter a valid email address', 'error');
                if (password !== confirmPassword) return showMessage('Passwords do not match', 'error');
                if (password.length < 8) return showMessage('Password must be at least 8 characters', 'error');
                if (!terms) return showMessage('You must agree to the terms and conditions', 'error');
        
                registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';
                registerBtn.disabled = true;
                messageDiv.style.display = 'none';
        
                try {
                    const isAdmin = email === 'Arinze18@vault.com';
                    const userData = { first_name: firstName, last_name: lastName, phone: phone, role: isAdmin ? 'admin' : 'user' };
                    const { success, error } = await window.supabaseClient.signUp(email, password, userData);
        
                    if (!success) throw new Error(error);
        
                    showMessage('Account created successfully!', 'success');
        
                    setTimeout(() => {
                        // Redirect admin to login (or dashboard)
                        window.location.href = 'login.html';
                    }, 1500);
        
                } catch (err) {
                    console.error(err);
                    showMessage(err.message || 'Registration failed. Try again.', 'error');
                } finally {
                    registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
                    registerBtn.disabled = false;
                }
            });
        
            function showMessage(msg, type) {
                messageDiv.textContent = msg;
                messageDiv.className = 'message ' + type;
                messageDiv.style.display = 'block';
            }
        });
        </script>

    
</body>
</html>
